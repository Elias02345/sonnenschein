<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonnenschein — Configuration</title>
  <link rel="icon" type="image/x-icon" href="./images/apollo.ico">
</head>

<body id="app" v-cloak>
  <Config-Page></Config-Page>
</body>

<script type="module">
  import { createApp } from 'vue'
  // Die Tab-Komponenten (configs/tabs/*) sind noch Bootstrap-basiert —
  // deren CSS/JS wird hier gezielt mitgeladen, die Shell ist PrimeVue.
  import 'bootstrap/dist/css/bootstrap.min.css'
  import 'bootstrap/dist/js/bootstrap'
  import 'primeicons/primeicons.css'
  import { initPrimeApp } from './primevue_init'
  import ConfigPage from './Config.vue'

  // Bootstrap-Formulare folgen dem PrimeVue-Dunkelmodus (data-bs-theme).
  const syncBsTheme = () => {
    document.documentElement.dataset.bsTheme =
      document.documentElement.classList.contains('sonnenschein-dark') ? 'dark' : 'light'
  }
  new MutationObserver(syncBsTheme).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['class']
  })

  const app = createApp({
    components: { ConfigPage }
  })

  initPrimeApp(app)
  syncBsTheme()
</script>

</html>
