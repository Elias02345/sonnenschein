name: Build (Linux)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Hardened (Phase 7, 2026-07-11): Arch, Ubuntu 24.04 and Fedora 41 build
# reliably, so build failures fail the workflow. New matrix entries may use
# continue-on-error temporarily while they stabilise.

jobs:
  build:
    name: ${{ matrix.distro.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - name: Arch
            image: archlinux:latest
            setup: |
              pacman -Syu --noconfirm
              pacman -S --noconfirm --needed \
                base-devel cmake git ninja \
                boost ffmpeg openssl curl miniupnpc \
                libdrm libva libpipewire libevdev \
                vulkan-icd-loader vulkan-headers \
                wayland wayland-protocols \
                libnotify libcap nodejs npm
          - name: Ubuntu-24.04
            image: ubuntu:24.04
            setup: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential cmake git ninja-build pkg-config \
                libboost-all-dev libssl-dev libcurl4-openssl-dev libminiupnpc-dev \
                libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev libswscale-dev \
                libdrm-dev libva-dev libpipewire-0.3-dev libevdev-dev \
                libvulkan-dev libwayland-dev wayland-protocols \
                libnotify-dev libcap-dev nodejs npm \
                ca-certificates
          - name: Fedora-41
            image: fedora:41
            setup: |
              dnf install -y --setopt=install_weak_deps=False \
                gcc-c++ cmake git ninja-build pkgconfig \
                boost-devel openssl-devel libcurl-devel miniupnpc-devel \
                libdrm-devel libva-devel pipewire-devel libevdev-devel \
                vulkan-loader-devel vulkan-headers \
                wayland-devel wayland-protocols-devel \
                libnotify-devel libcap-devel nodejs npm \
                ffmpeg-free-devel || true
              # Note: ffmpeg-full needs RPM Fusion, see docs/building.md (TODO).
          - name: openSUSE-Tumbleweed
            image: opensuse/tumbleweed:latest
            # New matrix entry (2026-07-12): experimental until proven green,
            # then drop the flag (same path Arch/Ubuntu/Fedora took).
            experimental: true
            setup: |
              zypper --non-interactive refresh
              zypper --non-interactive install --no-recommends \
                gcc13 gcc13-c++ cmake git ninja pkg-config tar gzip \
                libboost_headers-devel libboost_filesystem-devel libboost_log-devel \
                libboost_program_options-devel libboost_locale-devel \
                libopenssl-devel libcurl-devel miniupnpc-devel \
                libdrm-devel libva-devel pipewire-devel libevdev-devel \
                vulkan-devel wayland-devel wayland-protocols-devel \
                libnotify-tools libcap-devel nodejs npm \
                libgbm-devel libdisplay-info-devel libxkbcommon-devel \
                libopus-devel libpulse-devel libnuma-devel udev

    container:
      image: ${{ matrix.distro.image }}
      options: --user 0
    continue-on-error: ${{ matrix.distro.experimental || false }}
    # Phase 7 hardening (2026-07-11): Arch/Ubuntu/Fedora are genuinely green —
    # build failures fail the workflow. Experimental entries are exempt.

    steps:
      - name: Distro setup
        run: ${{ matrix.distro.setup }}

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: WebUI deps
        run: |
          npm ci || npm install

      - name: WebUI build
        run: npm run build || echo "::warning::WebUI build failed — Phase 1 task."

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            || echo "::warning::CMake configure failed — Phase 1 task."

      - name: Compile
        run: |
          if [ -f build/build.ninja ]; then
            cmake --build build -j$(nproc) || echo "::warning::Compile failed — Phase 1 task."
          else
            echo "Skipping compile (configure did not succeed)."
          fi

      - name: Upload build dir on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.distro.name }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/CMakeCache.txt
          if-no-files-found: ignore
